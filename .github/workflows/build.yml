name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with build number
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/sailing-coach-${{ github.run_number }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/sailing-coach-${{ github.run_number }}.apk
          make_latest: "true"
